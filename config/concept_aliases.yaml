# Normalized concept dictionary (ARCHITECTURE 4.3). Keys are <axis>.<metric>;
# values list raw XBRL concepts in fallback order. per_ticker entries take
# precedence over default. The resolver returns the first non-null match per
# (ticker, period).
#
# Hand-curated for the v1 corpus (decisions.md #2). Extend when adding tickers
# from new sectors.

profitability.revenue:
  default:
    - us-gaap:Revenues
    - us-gaap:SalesRevenueNet
    - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
  per_ticker:
    AAPL:
      - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
    MSFT:
      - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
    GOOGL:
      - us-gaap:Revenues
    META:
      - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
      - us-gaap:Revenues

profitability.net_income:
  default:
    - us-gaap:NetIncomeLoss
    - us-gaap:ProfitLoss

profitability.operating_income:
  default:
    - us-gaap:OperatingIncomeLoss

profitability.gross_profit:
  default:
    - us-gaap:GrossProfit

profitability.operating_expenses:
  default:
    - us-gaap:OperatingExpenses
    - us-gaap:CostsAndExpenses

profitability.cost_of_revenue:
  default:
    - us-gaap:CostOfRevenue
    - us-gaap:CostOfGoodsAndServicesSold

# Total debt is modeled from three disjoint components (noncurrent + current
# maturities + short-term), summed by the analyst. Never a single bundled tag:
# LongTermDebt (combined) and DebtCurrent overlap their components and would
# double count. KO drops LongTermDebtNoncurrent for the capital-lease-inclusive
# tag from FY2024; the fallbacks cover that without a per-ticker override.

leverage.long_term_debt:
  # Debt due after one year.
  default:
    - us-gaap:LongTermDebtNoncurrent
    - us-gaap:LongTermDebtAndCapitalLeaseObligations

leverage.current_debt:
  # Current maturities of long-term debt (due within one year).
  default:
    - us-gaap:LongTermDebtCurrent
    - us-gaap:LongTermDebtAndCapitalLeaseObligationsCurrent

leverage.short_term_debt:
  # Commercial paper / short-term borrowings. ShortTermBorrowings (loans and
  # notes payable) already bundles CP where tagged; filings that drop it fall
  # through to CommercialPaper.
  default:
    - us-gaap:ShortTermBorrowings
    - us-gaap:CommercialPaper

leverage.total_equity:
  default:
    - us-gaap:StockholdersEquity
    - us-gaap:StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest

leverage.cash_and_equivalents:
  # PG and other post-ASU-2016-18 filers tag the combined cash + restricted cash
  # concept instead of the pure one; restricted cash is immaterial for these
  # names, so it is an acceptable fallback when the pure concept is absent.
  default:
    - us-gaap:CashAndCashEquivalentsAtCarryingValue
    - us-gaap:CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents

leverage.total_assets:
  default:
    - us-gaap:Assets

leverage.total_liabilities:
  default:
    - us-gaap:Liabilities

growth.revenue:
  # Same concept as profitability.revenue; year-over-year math handled by callers.
  default:
    - us-gaap:Revenues
    - us-gaap:SalesRevenueNet
    - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
  per_ticker:
    AAPL:
      - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
    MSFT:
      - us-gaap:RevenueFromContractWithCustomerExcludingAssessedTax
