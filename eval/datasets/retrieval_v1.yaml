# Retrieval eval set v1 (2026-07-05). Labeled query-chunk pairs measuring the
# Qdrant hybrid (dense+sparse RRF) index against dense-only and sparse-only,
# per the Phase 16 checklist item: recall@k + MRR + the ColBERT decision.
#
# Two query populations, mirroring how the system actually searches:
# - planner: the fixed axis query the analyst path issues for risk_factors
#   (axis_config.AXIS_SEMANTIC), one per in-corpus ticker, section-filtered to
#   item_1a_risk_factors at top_k=5. Generic by construction, so labels mark
#   pooled candidates substantive-vs-boilerplate and the metric is judged
#   precision@5, not recall.
# - freeform: critic/MCP-style topic probes authored against the corpus, each
#   anchored to the chunks that substantively answer it. Metrics: success@k,
#   recall@k, MRR.
#
# Labeling protocol: candidates were pooled from the union of hybrid, dense,
# and sparse top-10 (TREC-style pooling), then each pooled chunk was labeled
# against the query. Freeform positive = the chunk substantively answers the
# query (near-duplicate repeats across 10-K/10-Q filings are all labeled
# positive). Planner positive = substantive risk-factor content for the ticker
# (vs TOC/cross-reference stubs/boilerplate). judged_chunk_ids records every
# pooled candidate seen during labeling so future index changes surface as
# "unjudged" rather than silently counting as negatives.
#
# Authoring rule for freeform

